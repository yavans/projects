<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniObservable — 响应式编程</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
    .app { max-width: 520px; width: 100%; }
    h1 { font-size: 1.6rem; color: #f472b6; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 32px; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #334155; }
    .card h2 { font-size: 1rem; color: #cbd5e1; margin-bottom: 16px; }
    .card label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; }
    .card input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; outline: none; }
    .card input:focus { border-color: #f472b6; }
    .result { margin-top: 12px; padding: 12px; background: #0f172a; border-radius: 8px; font-size: 0.85rem; color: #fbcfe8; min-height: 42px; line-height: 1.6; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-right: 6px; }
    .badge-map { background: #7c3aed33; color: #a78bfa; }
    .badge-filter { background: #05966933; color: #34d399; }
    .badge-debounce { background: #d9770633; color: #fbbf24; }
    .stream { display: flex; gap: 16px; flex-wrap: wrap; }
    .stream-box { flex: 1; min-width: 140px; }
    .stream-box h3 { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; }
    .stream-item { padding: 6px 12px; margin: 4px 0; border-radius: 6px; font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; background: #0f172a; animation: popIn 0.3s ease; }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .stream-item.map { border-left: 3px solid #a78bfa; }
    .stream-item.filter { border-left: 3px solid #34d399; }
    .stream-item.merge { border-left: 3px solid #f472b6; }
    button { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; margin-right: 8px; margin-top: 8px; }
    .btn-start { background: #f472b6; color: #0f172a; }
    .btn-stop { background: #475569; color: #e2e8f0; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="app">
    <h1>MiniObservable</h1>
    <p class="subtitle">RxJS-lite — Observable · operators · pipe pattern</p>

    <div class="card">
      <h2>Search with Debounce (fromEvent + debounceTime)</h2>
      <label>Type something — emits 400ms after last keystroke</label>
      <input type="text" id="search-input" placeholder="Type to search..." />
      <div class="result" id="search-result">Waiting for input...</div>
    </div>

    <div class="card">
      <h2>Interval + Map + Filter + Take</h2>
      <label>Emits every 500ms, maps ×10, filters >20, takes 5</label>
      <div class="result" id="interval-result">Press Start</div>
      <button class="btn-start" id="btn-start">Start Stream</button>
      <button class="btn-stop" id="btn-stop">Stop</button>
    </div>

    <div class="card">
      <h2>Merge — Two Intervals</h2>
      <label>Merges two streams: fast (300ms) + slow (700ms)</label>
      <div class="stream" style="margin-top:12px;">
        <div class="stream-box">
          <h3>Fast (300ms)</h3>
          <div id="stream-fast"></div>
        </div>
        <div class="stream-box">
          <h3>Slow (700ms)</h3>
          <div id="stream-slow"></div>
        </div>
        <div class="stream-box">
          <h3>Merged</h3>
          <div id="stream-merged"></div>
        </div>
      </div>
      <button class="btn-start" id="btn-merge-start">Start Merge</button>
      <button class="btn-stop" id="btn-merge-stop">Stop</button>
    </div>
  </div>

  <script type="module">
    import { Observable, fromEvent, interval, of, merge, map, filter, take, debounceTime } from './observable.js';

    // --- Debounce search ---
    const $searchInput = document.getElementById('search-input');
    const $searchResult = document.getElementById('search-result');

    fromEvent($searchInput, 'input')
      .pipe(
        map(e => e.target.value),
        filter(v => v.length >= 2),
        debounceTime(400)
      )
      .subscribe({
        next: (v) => {
          $searchResult.innerHTML = `Search query: <strong style="color:#f472b6;">"${escapeHtml(v)}"</strong> <span style="color:#94a3b8;">(${new Date().toLocaleTimeString()})</span>`;
        }
      });

    // --- Interval demo ---
    const $intervalResult = document.getElementById('interval-result');
    let intervalSub = null;

    document.getElementById('btn-start').onclick = () => {
      if (intervalSub) intervalSub.unsubscribe();
      $intervalResult.innerHTML = '';

      intervalSub = interval(500).pipe(
        map(x => x * 10),
        filter(x => x > 20),
        take(5)
      ).subscribe({
        next: (v) => addStreamItem($intervalResult, `Value: ${v}`, 'filter'),
        complete: () => addStreamItem($intervalResult, 'Stream complete ✓', 'filter')
      });
    };

    document.getElementById('btn-stop').onclick = () => {
      if (intervalSub) { intervalSub.unsubscribe(); intervalSub = null; }
      $intervalResult.innerHTML = 'Stopped';
    };

    // --- Merge demo ---
    let mergeSub = null;

    document.getElementById('btn-merge-start').onclick = () => {
      if (mergeSub) mergeSub.unsubscribe();
      document.getElementById('stream-fast').innerHTML = '';
      document.getElementById('stream-slow').innerHTML = '';
      document.getElementById('stream-merged').innerHTML = '';

      const fast = interval(300).pipe(take(5));
      const slow = interval(700).pipe(take(3));

      fast.subscribe(v => addStreamItem(document.getElementById('stream-fast'), `Tick ${v}`, 'merge'));
      slow.subscribe(v => addStreamItem(document.getElementById('stream-slow'), `Tick ${v}`, 'merge'));

      mergeSub = merge(fast, slow).subscribe(
        v => addStreamItem(document.getElementById('stream-merged'), `Tick ${v}`, 'merge')
      );
    };

    document.getElementById('btn-merge-stop').onclick = () => {
      if (mergeSub) { mergeSub.unsubscribe(); mergeSub = null; }
    };

    function addStreamItem(container, text, cls) {
      const div = document.createElement('div');
      div.className = `stream-item ${cls}`;
      div.textContent = text;
      container.appendChild(div);
      if (container.children.length > 10) container.firstChild.remove();
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
