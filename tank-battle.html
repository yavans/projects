<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双人坦克大战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 800px;
    padding: 0 8px;
  }
  .player-info {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }
  .player-info .tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
  }
  .p1 .tag { background: #e74c3c; }
  .p2 .tag { background: #3498db; }
  .hearts { font-size: 18px; letter-spacing: 2px; }
  .score {
    font-size: 28px;
    font-weight: 800;
    color: #f1c40f;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .score span { font-size: 14px; color: #fff; margin: 0 4px; }
  canvas {
    border: 2px solid #333;
    border-radius: 8px;
    background: #16213e;
    cursor: none;
  }
  .controls {
    display: flex;
    gap: 40px;
    color: #888;
    font-size: 13px;
  }
  .controls div { text-align: center; }
  .controls strong { color: #fff; display: block; margin-bottom: 4px; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay .card {
    background: #222;
    padding: 40px 48px;
    border-radius: 16px;
    text-align: center;
    color: #fff;
  }
  .overlay h2 { font-size: 32px; margin-bottom: 8px; }
  .overlay .winner-tag { font-size: 20px; margin-bottom: 24px; }
  .overlay button {
    padding: 12px 32px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: #fff;
    background: #5b6af0;
    transition: background 0.2s;
  }
  .overlay button:hover { background: #4a56d4; }
</style>
</head>
<body>

<div class="container">
  <div class="hud">
    <div class="player-info p1">
      <span class="tag">P1 红方</span>
      <span class="hearts" id="p1hearts">♥♥♥</span>
    </div>
    <div class="score" id="scoreboard">
      0 <span>:</span> 0
    </div>
    <div class="player-info p2">
      <span class="hearts" id="p2hearts">♥♥♥</span>
      <span class="tag">P2 蓝方</span>
    </div>
  </div>

  <canvas id="c" width="800" height="500"></canvas>

  <div class="controls">
    <div><strong>P1 红方</strong>WASD 移动 · F 射击</div>
    <div><strong>P2 蓝方</strong>↑↓←→ 移动 · / 射击</div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="card">
    <h2 id="winnerText"></h2>
    <div class="winner-tag" id="winnerSub"></div>
    <button onclick="restart()">再来一局</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const MAX_LIVES = 3;
  let p1Lives = MAX_LIVES;
  let p2Lives = MAX_LIVES;
  let p1Score = 0;
  let p2Score = 0;
  let gameOver = false;
  let respawnTimer = 0;
  let particles = [];

  // Input
  const keys = {};
  window.onkeydown = e => { keys[e.key] = true; e.preventDefault(); };
  window.onkeyup   = e => { keys[e.key] = false; e.preventDefault(); };

  // Walls
  const walls = [
    // Borders
    { x: 0, y: 0, w: W, h: 8 },
    { x: 0, y: H-8, w: W, h: 8 },
    { x: 0, y: 0, w: 8, h: H },
    { x: W-8, y: 0, w: 8, h: H },
    // Central obstacles
    { x: 200, y: 140, w: 120, h: 16 },
    { x: 480, y: 140, w: 120, h: 16 },
    { x: 200, y: 344, w: 120, h: 16 },
    { x: 480, y: 344, w: 120, h: 16 },
    { x: 360, y: 200, w: 80, h: 16 },
    { x: 360, y: 284, w: 80, h: 16 },
    { x: 200, y: 240, w: 16, h: 20 },
    { x: 584, y: 240, w: 16, h: 20 },
  ];

  // Tanks
  const TANK_SIZE = 18;
  const TANK_SPEED = 2.5;
  const BULLET_SPEED = 5;
  const RELOAD_TIME = 30;

  class Tank {
    constructor(x, y, angle, color) {
      this.x = x; this.y = y;
      this.angle = angle;
      this.color = color;
      this.vx = 0; this.vy = 0;
      this.reload = 0;
      this.alive = true;
      this.invincible = 0; // frames of invincibility after respawn
    }

    update() {
      if (!this.alive) return;
      this.x += this.vx;
      this.y += this.vy;

      // Wall collision
      for (const w of walls) {
        const cx = Math.max(w.x, Math.min(this.x, w.x + w.w));
        const cy = Math.max(w.y, Math.min(this.y, w.y + w.h));
        const dx = this.x - cx, dy = this.y - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < TANK_SIZE) {
          const overlap = TANK_SIZE - dist;
          const nx = dist ? dx / dist : 0;
          const ny = dist ? dy / dist : 0;
          this.x += nx * overlap;
          this.y += ny * overlap;
        }
      }

      // Tank vs tank collision
      for (const other of tanks) {
        if (other === this || !other.alive) continue;
        const dx = this.x - other.x, dy = this.y - other.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < TANK_SIZE * 2) {
          const overlap = TANK_SIZE * 2 - dist;
          const nx = dist ? dx / dist : 1;
          const ny = dist ? dy / dist : 0;
          this.x += nx * overlap * 0.5;
          this.y += ny * overlap * 0.5;
        }
      }

      this.x = Math.max(TANK_SIZE, Math.min(W - TANK_SIZE, this.x));
      this.y = Math.max(TANK_SIZE, Math.min(H - TANK_SIZE, this.y));

      if (this.reload > 0) this.reload--;
      if (this.invincible > 0) this.invincible--;
    }

    draw(ctx) {
      if (!this.alive) return;
      if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);

      // Body
      ctx.fillStyle = this.color;
      ctx.fillRect(-TANK_SIZE, -TANK_SIZE*0.7, TANK_SIZE*2, TANK_SIZE*1.4);

      // Tracks
      ctx.fillStyle = '#444';
      ctx.fillRect(-TANK_SIZE-2, -TANK_SIZE*0.85, 4, TANK_SIZE*1.7);
      ctx.fillRect(TANK_SIZE-2, -TANK_SIZE*0.85, 4, TANK_SIZE*1.7);

      // Turret - thinner barrel
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI*2);
      ctx.fill();

      // Barrel (points forward = right in local space)
      ctx.fillStyle = '#999';
      ctx.fillRect(5, -2.5, TANK_SIZE*0.9, 5);

      ctx.restore();
    }

    shoot(bullets) {
      if (!this.alive || this.reload > 0) return;
      bullets.push(new Bullet(
        this.x + Math.cos(this.angle) * (TANK_SIZE + 5),
        this.y + Math.sin(this.angle) * (TANK_SIZE + 5),
        this.angle,
        this
      ));
      this.reload = RELOAD_TIME;
    }
  }

  class Bullet {
    constructor(x, y, angle, owner) {
      this.x = x; this.y = y;
      this.vx = Math.cos(angle) * BULLET_SPEED;
      this.vy = Math.sin(angle) * BULLET_SPEED;
      this.owner = owner;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;

      // Wall bounce
      for (const w of walls) {
        if (this.x > w.x && this.x < w.x + w.w && this.y > w.y && this.y < w.y + w.h) {
          // Determine which side was hit
          const cx = w.x + w.w/2, cy = w.y + w.h/2;
          const dx = this.x - cx, dy = this.y - cy;
          const hw = w.w/2 + 3, hh = w.h/2 + 3;
          if (Math.abs(dx) * hh > Math.abs(dy) * hw) {
            this.vx *= -1;
          } else {
            this.vy *= -1;
          }
          this.x += this.vx * 2;
          this.y += this.vy * 2;
          return;
        }
      }

      return this.x < 0 || this.x > W || this.y < 0 || this.y > H;
    }

    draw(ctx) {
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Particles
  class Particle {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      this.vx = (Math.random() - 0.5) * 6;
      this.vy = (Math.random() - 0.5) * 6;
      this.life = 1;
      this.decay = 0.03 + Math.random() * 0.04;
      this.color = color;
      this.size = 2 + Math.random() * 3;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw(ctx) {
      ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
      ctx.globalAlpha = 1;
    }
  }

  // Players
  let p1 = new Tank(100, 250, 0, '#e74c3c');
  let p2 = new Tank(700, 250, Math.PI, '#3498db');
  let tanks = [p1, p2];
  let bullets = [];

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(x, y, color));
    }
  }

  function killPlayer(victim, killer) {
    if (!victim.alive) return;
    victim.alive = false;
    spawnParticles(victim.x, victim.y, victim.color, 20);

    if (killer === p1) p1Score++;
    else p2Score++;

    if (victim === p1) {
      p1Lives--;
      if (p1Lives <= 0) endGame(p2);
      else { respawnTimer = 90; }
    } else {
      p2Lives--;
      if (p2Lives <= 0) endGame(p1);
      else { respawnTimer = 90; }
    }
    updateHUD();
  }

  function respawnPlayers() {
    if (p1Lives > 0 && !p1.alive) {
      p1.x = 100; p1.y = 250; p1.angle = 0; p1.alive = true; p1.invincible = 60;
    }
    if (p2Lives > 0 && !p2.alive) {
      p2.x = 700; p2.y = 250; p2.angle = Math.PI; p2.alive = true; p2.invincible = 60;
    }
  }

  function endGame(winner) {
    gameOver = true;
    bullets = [];
    const overlay = document.getElementById('overlay');
    document.getElementById('winnerText').textContent =
      winner === p1 ? '红方获胜！' : '蓝方获胜！';
    document.getElementById('winnerSub').textContent =
      `最终比分  ${p1Score} : ${p2Score}`;
    overlay.classList.remove('hidden');
  }

  function updateHUD() {
    document.getElementById('p1hearts').textContent = '♥'.repeat(p1Lives) + '♡'.repeat(MAX_LIVES - p1Lives);
    document.getElementById('p2hearts').textContent = '♥'.repeat(p2Lives) + '♡'.repeat(MAX_LIVES - p2Lives);
    document.getElementById('scoreboard').innerHTML = `${p1Score} <span>:</span> ${p2Score}`;
  }

  function handleInput() {
    if (gameOver) return;

    // P1: WASD
    if (p1.alive) {
      let ax = keys['a'] ? -1 : keys['d'] ? 1 : 0;
      let ay = keys['w'] ? -1 : keys['s'] ? 1 : 0;
      if (ax !== 0 || ay !== 0) {
        const targetAngle = Math.atan2(ay, ax);
        // Smooth rotation
        let diff = targetAngle - p1.angle;
        while (diff > Math.PI) diff -= Math.PI*2;
        while (diff < -Math.PI) diff += Math.PI*2;
        p1.angle += diff * 0.15;
        p1.vx = Math.cos(p1.angle) * TANK_SPEED;
        p1.vy = Math.sin(p1.angle) * TANK_SPEED;
      } else {
        p1.vx = 0; p1.vy = 0;
      }
      if (keys['f']) p1.shoot(bullets);
    }

    // P2: Arrow keys
    if (p2.alive) {
      let ax = keys['ArrowLeft'] ? -1 : keys['ArrowRight'] ? 1 : 0;
      let ay = keys['ArrowUp'] ? -1 : keys['ArrowDown'] ? 1 : 0;
      if (ax !== 0 || ay !== 0) {
        const targetAngle = Math.atan2(ay, ax);
        let diff = targetAngle - p2.angle;
        while (diff > Math.PI) diff -= Math.PI*2;
        while (diff < -Math.PI) diff += Math.PI*2;
        p2.angle += diff * 0.15;
        p2.vx = Math.cos(p2.angle) * TANK_SPEED;
        p2.vy = Math.sin(p2.angle) * TANK_SPEED;
      } else {
        p2.vx = 0; p2.vy = 0;
      }
      if (keys['/']) p2.shoot(bullets);
    }
  }

  function update() {
    if (gameOver) return;

    handleInput();

    // Respawn timer
    if (respawnTimer > 0) {
      respawnTimer--;
      if (respawnTimer === 0) respawnPlayers();
    }

    for (const t of tanks) t.update();

    // Update bullets
    bullets = bullets.filter(b => {
      const offscreen = b.update();

      // Hit tanks
      for (const t of tanks) {
        if (!t.alive || t.invincible > 0) continue;
        if (t === b.owner) continue;
        const dx = b.x - t.x, dy = b.y - t.y;
        if (Math.sqrt(dx*dx + dy*dy) < TANK_SIZE) {
          killPlayer(t, b.owner);
          return false;
        }
      }
      return !offscreen;
    });

    // Update particles
    particles = particles.filter(p => { p.update(); return p.life > 0; });
  }

  function draw() {
    // Background grid
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#1a4a7a';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // Walls
    ctx.fillStyle = '#4a4a6a';
    for (const w of walls) {
      ctx.fillRect(w.x, w.y, w.w, w.h);
      // Bevel
      ctx.fillStyle = '#5a5a7a';
      ctx.fillRect(w.x, w.y, w.w, 3);
      ctx.fillStyle = '#3a3a5a';
      ctx.fillRect(w.x, w.y + w.h - 3, w.w, 3);
      ctx.fillStyle = '#4a4a6a';
    }

    // Bullets
    for (const b of bullets) b.draw(ctx);

    // Tanks
    for (const t of tanks) t.draw(ctx);

    // Particles
    for (const p of particles) p.draw(ctx);

    // Respawn countdown
    if (respawnTimer > 0) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      const secs = Math.ceil(respawnTimer / 60);
      if (!p1.alive) ctx.fillText(`红方复活: ${secs}s`, 100, 80);
      if (!p2.alive) ctx.fillText(`蓝方复活: ${secs}s`, 700, 80);
      ctx.textAlign = 'start';
    }
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  window.restart = function() {
    p1Lives = MAX_LIVES; p2Lives = MAX_LIVES;
    p1Score = 0; p2Score = 0;
    gameOver = false;
    respawnTimer = 0;
    bullets = [];
    particles = [];
    p1.x = 100; p1.y = 250; p1.angle = 0; p1.alive = true; p1.invincible = 60;
    p2.x = 700; p2.y = 250; p2.angle = Math.PI; p2.alive = true; p2.invincible = 60;
    document.getElementById('overlay').classList.add('hidden');
    updateHUD();
  };

  updateHUD();
  gameLoop();
</script>
</body>
</html>
