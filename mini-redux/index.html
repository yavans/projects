<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniRedux Demo — Counter & Todo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 16px; min-height: 100vh; }
  .app { max-width: 500px; width: 100%; display: flex; flex-direction: column; gap: 24px; }
  .panel { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .panel h2 { font-size: 15px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .counter-row { display: flex; align-items: center; gap: 16px; }
  .counter-row .val { font-size: 48px; font-weight: 300; font-variant-numeric: tabular-nums; min-width: 64px; text-align: center; }
  .counter-row button {
    width: 44px; height: 44px; border: none; border-radius: 12px; font-size: 20px; cursor: pointer; font-weight: 500;
    transition: all 0.15s;
  }
  .counter-row button:first-child { background: #fee2e2; color: #ef4444; }
  .counter-row button:first-child:hover { background: #fecaca; }
  .counter-row button:last-child { background: #dbeafe; color: #3b82f6; }
  .counter-row button:last-child:hover { background: #bfdbfe; }
  .counter-row .async-btn {
    width: auto; padding: 10px 18px; font-size: 13px; font-weight: 600; background: #fef3c7; color: #d97706; border-radius: 12px; border: none; cursor: pointer;
  }
  .counter-row .async-btn:hover { background: #fde68a; }
  .counter-row .async-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .todo-form { display: flex; gap: 8px; margin-bottom: 12px; }
  .todo-form input { flex: 1; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; }
  .todo-form input:focus { border-color: #3b82f6; }
  .todo-form button { padding: 10px 18px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: inherit; }
  .todo-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f8fafc; border-radius: 8px; font-size: 14px; }
  .todo-item.done span { text-decoration: line-through; color: #cbd5e1; }
  .todo-item input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }
  .todo-item span { flex: 1; cursor: pointer; user-select: none; }
  .todo-item button { border: none; background: transparent; color: #cbd5e1; font-size: 18px; cursor: pointer; }
  .todo-item button:hover { color: #ef4444; }

  .log-panel { background: #1e293b; color: #94a3b8; font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }
  .log-panel h2 { color: #64748b; }
  .log-entries { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .log-entry { display: flex; gap: 8px; }
  .log-entry .ts { color: #475569; }
  .log-entry .act { color: #f59e0b; }
  .log-entry .prev { color: #ef4444; }
  .log-entry .next { color: #10b981; }
</style>
</head>
<body>
<div class="app">
  <h1 style="font-size:24px;font-weight:700;letter-spacing:-0.5px">MiniRedux Demo</h1>

  <div class="panel" id="counterPanel">
    <h2>Counter</h2>
    <div class="counter-row">
      <button id="decBtn">−</button>
      <span class="val" id="counterVal">0</span>
      <button id="incBtn">+</button>
      <button class="async-btn" id="asyncBtn">Async +1</button>
    </div>
  </div>

  <div class="panel" id="todoPanel">
    <h2>Todo</h2>
    <div class="todo-form">
      <input id="todoInput" placeholder="Add todo..." />
      <button id="todoAdd">Add</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
  </div>

  <div class="panel log-panel">
    <h2>Action Log</h2>
    <div class="log-entries" id="logEntries"></div>
  </div>
</div>

<script src="mini-redux.js"></script>
<script>
  const { createStore, combineReducers, applyMiddleware, thunk, logger } = MiniRedux;

  // Reducers
  function counter(state = 0, action) {
    switch (action.type) {
      case 'INC': return state + 1;
      case 'DEC': return state - 1;
      case 'SET': return action.payload;
      default: return state;
    }
  }

  function todos(state = [], action) {
    switch (action.type) {
      case 'ADD_TODO':
        return [...state, { id: Date.now(), text: action.payload, done: false }];
      case 'TOGGLE_TODO':
        return state.map(t => t.id === action.payload ? { ...t, done: !t.done } : t);
      case 'REMOVE_TODO':
        return state.filter(t => t.id !== action.payload);
      default: return state;
    }
  }

  const reducer = combineReducers({ counter, todos });
  const store = createStore(reducer, applyMiddleware(thunk, logger));

  // Action Creators
  const inc = () => ({ type: 'INC' });
  const dec = () => ({ type: 'DEC' });
  const asyncInc = () => (dispatch) => {
    dispatch({ type: 'SET', payload: '...' });
    setTimeout(() => dispatch({ type: 'INC' }), 800);
  };

  // Render
  const counterVal = document.getElementById('counterVal');
  const todoListEl = document.getElementById('todoList');
  const todoInput = document.getElementById('todoInput');
  const logEntries = document.getElementById('logEntries');

  function render() {
    const { counter, todos } = store.getState();
    counterVal.textContent = counter;

    todoListEl.innerHTML = '';
    todos.forEach(t => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (t.done ? ' done' : '');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = t.done;
      cb.onchange = () => store.dispatch({ type: 'TOGGLE_TODO', payload: t.id });
      const span = document.createElement('span');
      span.textContent = t.text;
      span.onclick = () => store.dispatch({ type: 'TOGGLE_TODO', payload: t.id });
      const del = document.createElement('button');
      del.textContent = '×';
      del.onclick = () => store.dispatch({ type: 'REMOVE_TODO', payload: t.id });
      li.append(cb, span, del);
      todoListEl.appendChild(li);
    });
  }

  store.subscribe(render);
  render();

  document.getElementById('incBtn').onclick = () => store.dispatch(inc());
  document.getElementById('decBtn').onclick = () => store.dispatch(dec());
  document.getElementById('asyncBtn').onclick = () => store.dispatch(asyncInc());
  document.getElementById('todoAdd').onclick = () => {
    const text = todoInput.value.trim();
    if (text) { store.dispatch({ type: 'ADD_TODO', payload: text }); todoInput.value = ''; }
  };
  todoInput.onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('todoAdd').click(); };
</script>
</body>
</html>
